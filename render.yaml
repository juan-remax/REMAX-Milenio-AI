services:
  - type: web
    name: remax-milenio-ai
    runtime: python
    repo: https://github.com/juan-remax/REMAX-Milenio-AI
    plan: free
    buildCommand: pip install -e ".[dev]"
    startCommand: uvicorn src.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: BOT_TOKEN
        sync: false
      - key: ALLOWED_USER_IDS
        value: "[8346555881]"
      - key: DATABASE_URL
        fromDatabase:
          name: remax-milenio-db
          property: connectionString
      - key: GITHUB_TOKEN
        sync: false

databases:
  - name: remax-milenio-db
    plan: free
    databaseType: postgresql
    ipAllowList: []
